server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: kinghh-blog-api
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${BLOG_DB_URL:jdbc:mysql://127.0.0.1:3306/kinghh_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${BLOG_DB_USER:kinghh_blog}
    password: ${BLOG_DB_PASSWORD:change-me}
    hikari:
      maximum-pool-size: 6
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 900000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

blog:
  security:
    jwt-secret: ${BLOG_JWT_SECRET:please-change-this-dev-secret-please-change}
    token-expire-hours: ${BLOG_TOKEN_EXPIRE_HOURS:168}

logging:
  level:
    cn.kinghh.blog: info
